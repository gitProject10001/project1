<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Explorer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      canvas { display: block; }
      #hud {
        position: fixed;
        top: 16px;
        left: 16px;
        color: #0f0;
        font-family: 'Courier New', monospace;
        font-size: 13px;
        pointer-events: none;
        text-shadow: 0 0 4px #0f0;
        line-height: 1.6;
        z-index: 10;
      }
      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 24px;
        height: 24px;
        pointer-events: none;
        z-index: 10;
      }
      #crosshair::before, #crosshair::after {
        content: '';
        position: absolute;
        background: rgba(0, 255, 100, 0.6);
      }
      #crosshair::before {
        width: 2px; height: 100%;
        left: 50%; transform: translateX(-50%);
      }
      #crosshair::after {
        height: 2px; width: 100%;
        top: 50%; transform: translateY(-50%);
      }
      #instructions {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255,255,255,0.5);
        font-family: 'Courier New', monospace;
        font-size: 12px;
        pointer-events: none;
        text-align: center;
        z-index: 10;
      }

      /* ---- GUI Panel ---- */
      #gui-toggle {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 1000;
        background: rgba(20, 20, 30, 0.85);
        color: #8af;
        border: 1px solid rgba(100, 160, 255, 0.3);
        border-radius: 6px;
        padding: 6px 14px;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        cursor: pointer;
        backdrop-filter: blur(8px);
        transition: background 0.2s, border-color 0.2s;
      }
      #gui-toggle:hover { background: rgba(30, 30, 50, 0.95); border-color: rgba(100, 160, 255, 0.6); }
      #gui-toggle.active { background: rgba(40, 40, 70, 0.95); border-color: #8af; color: #bdf; }

      #gui-panel {
        position: fixed;
        top: 48px;
        right: 16px;
        width: 320px;
        max-height: calc(100vh - 64px);
        overflow-y: auto;
        z-index: 999;
        font-family: 'Courier New', monospace;
        font-size: 11px;
        scrollbar-width: thin;
        scrollbar-color: rgba(100,160,255,0.3) transparent;
      }
      #gui-panel::-webkit-scrollbar { width: 4px; }
      #gui-panel::-webkit-scrollbar-track { background: transparent; }
      #gui-panel::-webkit-scrollbar-thumb { background: rgba(100,160,255,0.3); border-radius: 2px; }

      .gui-card {
        background: rgba(12, 12, 22, 0.88);
        border: 1px solid rgba(100, 160, 255, 0.15);
        border-radius: 8px;
        margin-bottom: 6px;
        backdrop-filter: blur(12px);
        overflow: hidden;
        transition: border-color 0.2s;
      }
      .gui-card:hover { border-color: rgba(100, 160, 255, 0.3); }
      .gui-card.open { border-color: rgba(100, 160, 255, 0.4); }

      .gui-card-header {
        display: flex;
        align-items: center;
        padding: 8px 12px;
        cursor: pointer;
        color: #9cc;
        user-select: none;
        transition: background 0.15s;
      }
      .gui-card-header:hover { background: rgba(40, 50, 70, 0.4); }

      .gui-card-icon { margin-right: 8px; font-size: 14px; }
      .gui-card-title { flex: 1; font-size: 12px; font-weight: bold; letter-spacing: 0.5px; color: #bde; }
      .gui-card-arrow {
        font-size: 8px;
        color: rgba(150, 200, 255, 0.4);
        transition: transform 0.2s;
      }
      .gui-card.open .gui-card-arrow { transform: rotate(180deg); }

      .gui-card-body {
        padding: 4px 12px 10px;
        border-top: 1px solid rgba(100, 160, 255, 0.08);
      }

      .gui-row {
        display: grid;
        grid-template-columns: 1fr 120px 48px;
        align-items: center;
        gap: 6px;
        padding: 3px 0;
      }
      .gui-color-row {
        grid-template-columns: 1fr 40px;
      }

      .gui-label {
        color: rgba(180, 200, 230, 0.7);
        font-size: 10px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .gui-value {
        color: #8cf;
        font-size: 10px;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .gui-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        background: rgba(60, 80, 120, 0.5);
        border-radius: 2px;
        outline: none;
        cursor: pointer;
      }
      .gui-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #6af;
        border: 1px solid rgba(100, 180, 255, 0.6);
        cursor: pointer;
        transition: background 0.15s;
      }
      .gui-slider::-webkit-slider-thumb:hover { background: #8cf; }
      .gui-slider::-moz-range-thumb {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #6af;
        border: 1px solid rgba(100, 180, 255, 0.6);
        cursor: pointer;
      }

      .gui-color {
        width: 32px;
        height: 20px;
        border: 1px solid rgba(100, 160, 255, 0.3);
        border-radius: 3px;
        background: none;
        cursor: pointer;
        padding: 0;
      }
      .gui-color::-webkit-color-swatch-wrapper { padding: 1px; }
      .gui-color::-webkit-color-swatch { border: none; border-radius: 2px; }
    </style>
  </head>
  <body>
    <div id="hud"></div>
    <div id="crosshair"></div>
    <div id="instructions">
      WASD: Thrust | QE: Roll | Shift: Boost | Mouse: Pitch/Yaw | Click to lock cursor
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
